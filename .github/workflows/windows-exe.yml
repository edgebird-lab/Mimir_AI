name: Build Windows installer (.exe)

# Builds the NATIVE Windows MimirInstaller.exe (no Docker, no WSL) on a Windows runner:
# a self-contained Python runtime + llama.cpp Vulkan + Redis are staged and compiled with Inno Setup.
# It is built from tracked files only (git archive), so it never contains secrets, models, or user data.
# The installer is UNSIGNED (no code-signing certificate), so Windows SmartScreen will warn users -
# documented in README/INSTALL. Attaches the .exe to the GitHub Release when you push a tag like v1.0.0.

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-exe:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y

      - name: Build MimirInstaller.exe (native)
        shell: pwsh
        run: powershell -ExecutionPolicy Bypass -File windows-native\Build-Installer.ps1

      - name: Upload as build artifact
        uses: actions/upload-artifact@v4
        with:
          name: MimirInstaller
          path: dist/*.exe

      - name: Attach to release (on tag)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.exe
