name: Build Windows installer (.exe)

# Builds MimirInstaller.exe with Inno Setup inside the amake/innosetup Docker
# image (Inno Setup under Wine — no Windows runner needed) and attaches it to the
# GitHub Release when you push a tag like v1.0.0. The installer is built from
# `git archive HEAD`, so it contains only tracked files (never secrets/models).
# It is UNSIGNED (no code-signing certificate), so Windows SmartScreen will warn
# users — this is documented in README/INSTALL.

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-exe:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build MimirInstaller.exe (Inno Setup via Docker)
        run: bash windows/build-setup-exe.sh

      - name: Upload as build artifact
        uses: actions/upload-artifact@v4
        with:
          name: MimirInstaller
          path: dist/*.exe

      - name: Attach to release (on tag)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.exe
