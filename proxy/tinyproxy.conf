# Mimir egress proxy — the ONLY path off-box for Zone B primitives.
# Default-deny: only hosts in /etc/tinyproxy/filter (from config/egress-allowlist.txt) are
# reachable. Payment/bank/crypto hosts are never allowlisted, so they are refused here too.
# NOTE: tinyproxy does NOT allow inline comments on directive lines — keep comments on their own line.
Port 8888
Listen 0.0.0.0
Timeout 30
Allow 0.0.0.0/0
Filter "/etc/tinyproxy/filter"
FilterDefaultDeny Yes
FilterType ere
FilterCaseSensitive Off
ConnectPort 443
ConnectPort 80
DisableViaHeader Yes
LogLevel Warning
